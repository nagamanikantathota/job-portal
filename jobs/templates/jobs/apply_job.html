{% extends 'jobs/base.html' %}

{% block content %}
<h2>Apply for {{ job.title }}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% if form.errors %}
        <div class="errors">
            {{ form.errors }}
        </div>
    {% endif %}
    {{ form.as_p }}
    <button type="submit" class="btn">Submit Application</button>
</form>
{% endblock %}
